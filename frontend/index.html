<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warta</title>
<style>
  /* ── Fonts ── */
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap');

  /* ── Design tokens ── */
  :root {
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --radius: 16px;
    --radius-sm: 10px;
    --radius-pill: 999px;
    --shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.06);
    --shadow-md: 0 4px 6px rgba(0,0,0,.04), 0 12px 32px rgba(0,0,0,.1);
    --shadow-lg: 0 8px 16px rgba(0,0,0,.06), 0 24px 48px rgba(0,0,0,.12);
    --transition: 180ms cubic-bezier(.4,0,.2,1);
    --transition-slow: 300ms cubic-bezier(.4,0,.2,1);
  }
  [data-theme="light"] {
    --bg: #F8F6F3;
    --bg-card: #FFFFFF;
    --bg-input: #F1EFEC;
    --bg-hover: #ECEAE6;
    --bg-sidebar: #F1EFEB;
    --bg-code: #F5F3F0;
    --text: #1A1916;
    --text-2: #5C5954;
    --text-3: #9B9894;
    --accent: #C45C2E;
    --accent-2: #E8835A;
    --accent-soft: rgba(196,92,46,.08);
    --accent-text: #FFFFFF;
    --border: #E6E2DD;
    --border-strong: #D4CFC9;
    --green: #2E7D52;
    --red: #B83232;
    --blue: #2563EB;
    --yellow: #D97706;
    --purple: #7C3AED;
  }
  [data-theme="dark"] {
    --bg: #121110;
    --bg-card: #1C1A18;
    --bg-input: #262422;
    --bg-hover: #222120;
    --bg-sidebar: #161413;
    --bg-code: #1E1C1A;
    --text: #F0EDE8;
    --text-2: #9E9B96;
    --text-3: #5E5C59;
    --accent: #E07046;
    --accent-2: #F59060;
    --accent-soft: rgba(224,112,70,.1);
    --accent-text: #FFFFFF;
    --border: #2A2826;
    --border-strong: #3A3836;
    --green: #4CAF7A;
    --red: #E05555;
    --blue: #60A5FA;
    --yellow: #FBBF24;
    --purple: #A78BFA;
  }

  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--transition-slow), color var(--transition-slow);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input, textarea { font-family: inherit; }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; }

  /* ── Layout ── */
  #app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 240px; flex-shrink: 0;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
    padding: 20px 12px;
    gap: 2px;
  }
  .sidebar-logo {
    font-family: var(--font-display);
    font-size: 1.6rem;
    color: var(--accent);
    padding: 8px 12px 20px;
    letter-spacing: -.02em;
  }
  .sidebar-logo span { color: var(--text-3); font-size: .85rem; font-family: var(--font-body); font-style: italic; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: var(--radius-sm);
    color: var(--text-2); font-size: .9rem; font-weight: 500;
    cursor: pointer; transition: all var(--transition);
    white-space: nowrap;
    position: relative;
  }
  .nav-item:hover { background: var(--bg-hover); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .nav-item.active::before {
    content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 20px; background: var(--accent); border-radius: 0 3px 3px 0;
  }
  .nav-item .icon { font-size: 1.1rem; width: 22px; text-align: center; }
  .nav-spacer { flex: 1; }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--bg-card) 85%, transparent);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 10;
    gap: 12px;
  }
  .topbar-title { font-family: var(--font-display); font-size: 1.25rem; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }

  .feed { max-width: 620px; margin: 0 auto; padding: 20px 16px; width: 100%; }

  /* ── Cards ── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    transition: border-color var(--transition), box-shadow var(--transition);
    box-shadow: var(--shadow);
  }
  .card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); }

  /* ── Post composer ── */
  .composer { margin-bottom: 16px; }
  .composer textarea {
    width: 100%; background: var(--bg-input); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
    color: var(--text); font-size: .95rem; resize: none;
    transition: border-color var(--transition), box-shadow var(--transition);
    min-height: 80px; line-height: 1.5;
  }
  .composer textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .composer-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px; gap: 8px;
  }
  .char-count { font-size: .8rem; color: var(--text-3); }
  .char-count.warn { color: var(--red); }
  .composer-actions { display: flex; gap: 8px; align-items: center; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px; border-radius: var(--radius-pill);
    font-size: .875rem; font-weight: 500; cursor: pointer;
    transition: all var(--transition); border: none;
    letter-spacing: .01em;
  }
  .btn-primary { background: var(--accent); color: white; box-shadow: 0 1px 3px rgba(196,92,46,.3); }
  .btn-primary:hover { background: var(--accent-2); box-shadow: 0 2px 8px rgba(196,92,46,.35); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-ghost {
    background: transparent; color: var(--text-2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border-strong); }
  .btn-sm { padding: 6px 14px; font-size: .8rem; }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { opacity: .9; }
  .btn-icon {
    width: 34px; height: 34px; border-radius: var(--radius-pill);
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; color: var(--text-2);
    transition: all var(--transition); border: none; font-size: 1rem;
    cursor: pointer;
  }
  .btn-icon:hover { background: var(--bg-hover); color: var(--text); }

  /* ── Post ── */
  .post-header {
    display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px;
  }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-soft), var(--bg-input));
    display: flex; align-items: center;
    justify-content: center; font-size: 1rem; flex-shrink: 0;
    object-fit: cover; overflow: hidden;
    border: 2px solid var(--border);
    transition: border-color var(--transition);
  }
  .card:hover .avatar { border-color: var(--accent); }
  .post-meta { flex: 1; min-width: 0; }
  .post-author { font-weight: 600; font-size: .9rem; }
  .post-username { color: var(--text-3); font-size: .8rem; }
  .post-time { color: var(--text-3); font-size: .78rem; }
  .post-content { font-size: .95rem; line-height: 1.6; margin-bottom: 12px; white-space: pre-wrap; word-break: break-word; }
  .post-content.longform {
    font-size: 1rem; line-height: 1.75; white-space: normal;
  }
  .post-content.md-rendered { white-space: normal; }
  .post-title {
    font-family: var(--font-display);
    font-size: 1.25rem; margin-bottom: 10px; color: var(--text);
    letter-spacing: -.01em;
  }
  .post-type-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: .7rem; font-weight: 600; letter-spacing: .03em;
    padding: 2px 8px; border-radius: var(--radius-pill);
    background: var(--accent-soft); color: var(--accent);
    text-transform: uppercase;
  }
  .post-actions {
    display: flex; align-items: center; gap: 2px;
    padding-top: 10px; border-top: 1px solid var(--border);
  }
  .action-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: var(--radius-pill);
    font-size: .82rem; color: var(--text-3);
    cursor: pointer; transition: all var(--transition);
    background: none; border: none; font-family: inherit;
  }
  .action-btn:hover { background: var(--bg-hover); color: var(--text); }
  .action-btn.reacted { color: var(--accent); background: var(--accent-soft); }
  .action-btn .icon { font-size: .9rem; }
  .expand-btn {
    margin-left: auto;
    font-size: .78rem; color: var(--accent); font-weight: 500;
    padding: 5px 12px; border-radius: var(--radius-pill);
    cursor: pointer; background: var(--accent-soft); border: none;
    font-family: inherit; transition: all var(--transition);
  }
  .expand-btn:hover { background: var(--accent); color: white; }

  /* ── Longform expansion ── */
  .longform-panel {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 2px solid var(--accent-soft);
    display: none;
    animation: fadeSlideIn .3s ease;
  }
  .longform-panel.open { display: block; }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: none; }
  }

  /* ── Markdown rendered content ── */
  .md-rendered h1, .md-rendered h2, .md-rendered h3, .md-rendered h4 {
    font-family: var(--font-display); color: var(--text);
    margin: 1.2em 0 .5em; line-height: 1.3; letter-spacing: -.01em;
  }
  .md-rendered h1 { font-size: 1.5rem; }
  .md-rendered h2 { font-size: 1.25rem; }
  .md-rendered h3 { font-size: 1.1rem; }
  .md-rendered h4 { font-size: 1rem; font-weight: 600; }
  .md-rendered p { margin: .6em 0; }
  .md-rendered strong { font-weight: 700; color: var(--text); }
  .md-rendered em { font-style: italic; }
  .md-rendered a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
  .md-rendered a:hover { color: var(--accent-2); }
  .md-rendered code {
    font-family: var(--font-mono); font-size: .85em;
    background: var(--bg-code); color: var(--accent);
    padding: 2px 6px; border-radius: 4px;
    border: 1px solid var(--border);
  }
  .md-rendered pre {
    margin: .8em 0; border-radius: var(--radius-sm);
    background: var(--bg-code); border: 1px solid var(--border);
    overflow-x: auto; position: relative;
  }
  .md-rendered pre code {
    display: block; padding: 14px 16px;
    background: none; border: none; color: var(--text);
    font-size: .82rem; line-height: 1.6;
  }
  .md-rendered blockquote {
    margin: .8em 0; padding: .5em 1em;
    border-left: 3px solid var(--accent);
    background: var(--accent-soft);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text-2); font-style: italic;
  }
  .md-rendered blockquote p { margin: .25em 0; }
  .md-rendered ul, .md-rendered ol {
    margin: .6em 0; padding-left: 1.5em;
  }
  .md-rendered li { margin: .25em 0; line-height: 1.5; }
  .md-rendered li::marker { color: var(--accent); }
  .md-rendered hr {
    border: none; height: 1px; background: var(--border);
    margin: 1.2em 0;
  }
  .md-rendered img { max-width: 100%; border-radius: var(--radius-sm); margin: .5em 0; }
  .md-rendered .task-item { list-style: none; margin-left: -1.5em; }
  .md-rendered .task-item input { margin-right: .4em; accent-color: var(--accent); }

  /* ── Markdown toolbar ── */
  .md-toolbar {
    display: flex; gap: 2px; padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-input); border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    flex-wrap: wrap; align-items: center;
  }
  .md-toolbar button {
    width: 30px; height: 28px; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: .82rem; color: var(--text-2);
    background: none; border: none; cursor: pointer;
    transition: all var(--transition); font-family: var(--font-mono);
    font-weight: 600;
  }
  .md-toolbar button:hover { background: var(--bg-hover); color: var(--text); }
  .md-toolbar .sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
  .md-toolbar .md-hint {
    margin-left: auto; font-size: .72rem; color: var(--text-3);
    font-family: var(--font-body); font-weight: 400;
  }

  /* ── Longform compose tabs ── */
  .lf-tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .lf-tab {
    padding: 8px 16px; font-size: .85rem; font-weight: 500;
    color: var(--text-3); cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent; transition: all var(--transition);
    font-family: inherit;
  }
  .lf-tab:hover { color: var(--text); }
  .lf-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .lf-preview {
    min-height: 200px; padding: 12px 0;
    font-size: .95rem; line-height: 1.65;
  }
  .lf-preview-empty {
    color: var(--text-3); font-style: italic; text-align: center; padding: 48px 16px;
  }

  /* ── Comments ── */
  .comments-section {
    margin-top: 12px; display: none;
    animation: fadeSlideIn .25s ease;
  }
  .comments-section.open { display: block; }
  .comment-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .comment-input-row input {
    flex: 1; background: var(--bg-input); border: 1px solid var(--border);
    border-radius: var(--radius-pill); padding: 9px 16px;
    color: var(--text); font-size: .875rem;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .comment-input-row input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .comment {
    display: flex; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .comment:last-child { border-bottom: none; }
  .comment-body { flex: 1; }
  .comment-author { font-size: .82rem; font-weight: 600; }
  .comment-text { font-size: .875rem; color: var(--text-2); line-height: 1.5; }
  .comment-text.md-rendered { white-space: normal; }
  .comment-time { font-size: .75rem; color: var(--text-3); }

  /* ── Media ── */
  .post-media { margin: 8px 0; border-radius: var(--radius-sm); overflow: hidden; }
  .post-media img { width: 100%; max-height: 480px; object-fit: cover; }
  .post-media audio, .post-media video { width: 100%; }
  .media-grid {
    display: grid; gap: 4px;
    grid-template-columns: repeat(2, 1fr);
    border-radius: var(--radius-sm); overflow: hidden;
  }
  .media-grid img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; }
  .media-grid.single img { height: auto; max-height: 480px; }

  /* ── Forms / Auth ── */
  .auth-wrap {
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; padding: 24px;
  }
  .auth-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px; width: 100%; max-width: 400px;
    box-shadow: var(--shadow-lg);
  }
  .auth-logo {
    font-family: var(--font-display); font-size: 2rem;
    color: var(--accent); margin-bottom: 4px;
  }
  .auth-sub { color: var(--text-3); font-size: .875rem; margin-bottom: 24px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: .82rem; font-weight: 500; margin-bottom: 5px; color: var(--text-2); }
  .field input, .field textarea, .field select {
    width: 100%; background: var(--bg-input); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    color: var(--text); font-size: .9rem;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .field-hint { font-size: .78rem; color: var(--text-3); margin-top: 4px; }

  /* ── Messages ── */
  .messages-layout { display: flex; height: calc(100vh - 57px); }
  .convo-list { width: 260px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; }
  .convo-item {
    display: flex; gap: 10px; padding: 12px 14px;
    cursor: pointer; border-bottom: 1px solid var(--border);
    transition: background var(--transition);
  }
  .convo-item:hover { background: var(--bg-hover); }
  .convo-item.active { background: var(--bg-input); }
  .convo-name { font-weight: 500; font-size: .9rem; }
  .convo-preview { font-size: .8rem; color: var(--text-3); }
  .unread-badge {
    background: var(--accent); color: white;
    font-size: .7rem; font-weight: 700;
    padding: 2px 6px; border-radius: var(--radius-pill);
    margin-left: auto; align-self: center;
  }
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .message-bubble {
    max-width: 70%; padding: 9px 13px;
    border-radius: var(--radius); font-size: .9rem; line-height: 1.45;
  }
  .message-bubble.mine {
    background: var(--accent); color: white;
    align-self: flex-end; border-bottom-right-radius: 4px;
  }
  .message-bubble.theirs {
    background: var(--bg-input); color: var(--text);
    align-self: flex-start; border-bottom-left-radius: 4px;
  }
  .message-bubble.decrypting { opacity: 0.6; font-style: italic; }
  .chat-input-row {
    display: flex; gap: 8px; padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .chat-input-row input {
    flex: 1; background: var(--bg-input); border: 1px solid var(--border);
    border-radius: var(--radius-pill); padding: 9px 14px;
    color: var(--text); font-size: .9rem;
  }
  .chat-input-row input:focus { outline: none; border-color: var(--accent); }
  .e2ee-notice {
    text-align: center; font-size: .75rem; color: var(--text-3);
    padding: 6px; border-bottom: 1px solid var(--border);
  }

  /* ── Toast ── */
  #toasts {
    position: fixed; bottom: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 8px; z-index: 9999;
  }
  .toast {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 18px;
    font-size: .875rem; box-shadow: var(--shadow-lg);
    animation: toastIn .25s cubic-bezier(.4,0,.2,1); max-width: 340px;
  }
  .toast.error { border-left: 3px solid var(--red); }
  .toast.success { border-left: 3px solid var(--green); }
  @keyframes toastIn {
    from { transform: translateY(8px) scale(.96); opacity: 0; }
    to { transform: none; opacity: 1; }
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 16px; backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px;
    width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: modalIn .2s cubic-bezier(.4,0,.2,1);
  }
  @keyframes modalIn {
    from { transform: scale(.96) translateY(8px); opacity: 0; }
    to { transform: none; opacity: 1; }
  }
  .modal-title {
    font-family: var(--font-display); font-size: 1.2rem;
    margin-bottom: 16px;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* ── Quota bar ── */
  .quota-bar { background: var(--bg-input); border-radius: var(--radius-pill); height: 6px; margin: 4px 0; overflow: hidden; }
  .quota-fill { height: 100%; background: var(--accent); border-radius: var(--radius-pill); transition: width .4s; }

  /* ── Upload area ── */

    transition: border-color var(--transition); color: var(--text-3);

  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); color: var(--text); }

  /* ── Mod ── */
  .vote-bar { display: flex; gap: 4px; align-items: center; font-size: .78rem; color: var(--text-3); }
  .vote-remove { color: var(--red); font-weight: 600; }
  .vote-keep { color: var(--green); font-weight: 600; }

  /* ── Admin panel ── */
  .admin-section { margin-bottom: 24px; }
  .admin-section h3 { font-family: var(--font-display); font-size: 1rem; margin-bottom: 10px; color: var(--text-2); }
  .user-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); margin-bottom: 6px;
    background: var(--bg-card);
  }
  .user-row .username { font-weight: 500; }
  .user-row .email { font-size: .8rem; color: var(--text-3); }
  .user-row.disabled { opacity: .5; }
  .badge {
    font-size: .7rem; padding: 2px 7px; border-radius: var(--radius-pill);
    font-weight: 600;
  }
  .badge-admin { background: var(--accent); color: white; }
  .badge-disabled { background: var(--red); color: white; }

  /* ── Theme toggle ── */
  .theme-toggle {
    width: 42px; height: 24px; border-radius: var(--radius-pill);
    background: var(--bg-input); border: 1px solid var(--border);
    position: relative; cursor: pointer; transition: background var(--transition);
    display: inline-flex; align-items: center;
  }
  .theme-toggle-knob {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--text); position: absolute; left: 3px;
    transition: transform var(--transition);
  }
  [data-theme="dark"] .theme-toggle-knob { transform: translateX(18px); }

  /* ── Profile page ── */
  .profile-header {
    padding: 24px; border-bottom: 1px solid var(--border);
    display: flex; gap: 16px; align-items: flex-start;
  }
  .profile-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    border: 3px solid var(--border); object-fit: cover; font-size: 2rem;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-input);
  }

  /* ── Invite ── */
  .invite-code {
    font-family: monospace; font-size: .9rem;
    background: var(--bg-input); padding: 6px 12px;
    border-radius: var(--radius-sm); border: 1px solid var(--border);
    word-break: break-all;
  }
  .invite-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); margin-bottom: 6px;
    font-size: .875rem;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .sidebar { width: 56px; padding: 12px 8px; }
    .sidebar-logo, .nav-item span, .sidebar .nav-label { display: none; }
    .nav-item { justify-content: center; padding: 10px; }
    .feed { padding: 12px 8px; }
    .topbar { padding: 10px 14px; }
  }
</style>
</head>
<body>

<div id="toasts"></div>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const API = '/api';
const state = {
  user: null,
  token: null,
  page: 'feed',
  posts: [],
  comments: {},
  users: [],
  messages: {},
  conversations: [],
  activeConvo: null,
  invites: [],
  adminUsers: [],
  modQueue: [],
  quotaInfo: null,
  ws: null,
  privateKey: null, // E2EE
  publicKey: null,
};

// ── Theme ──────────────────────────────────────────────────
function applyTheme(pref) {
  if (pref === 'auto') {
    const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.dataset.theme = dark ? 'dark' : 'light';
  } else {
    document.documentElement.dataset.theme = pref;
  }
  localStorage.setItem('theme', pref);
}
function toggleTheme() {
  const cur = document.documentElement.dataset.theme;
  const next = cur === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  if (state.user) {
    apiFetch('PUT', '/users/me', { theme_pref: next });
  }
}
const savedTheme = localStorage.getItem('theme') || 'auto';
applyTheme(savedTheme);
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if ((localStorage.getItem('theme') || 'auto') === 'auto') applyTheme('auto');
});

// ── Auth state ─────────────────────────────────────────────
function loadAuth() {
  const t = sessionStorage.getItem('token') || localStorage.getItem('token');
  const u = sessionStorage.getItem('user') || localStorage.getItem('user');
  if (t && u) {
    state.token = t;
    state.user = JSON.parse(u);
    return true;
  }
  return false;
}
function saveAuth(token, user, remember) {
  state.token = token;
  state.user = user;
  const storage = remember ? localStorage : sessionStorage;
  storage.setItem('token', token);
  storage.setItem('user', JSON.stringify(user));
}
function clearAuth() {
  state.token = null; state.user = null;
  localStorage.removeItem('token'); localStorage.removeItem('user');
  sessionStorage.removeItem('token'); sessionStorage.removeItem('user');
}

// ── API helper ─────────────────────────────────────────────
async function apiFetch(method, path, body, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
  try {
    const res = await fetch(API + path, {
      method, headers,
      body: body ? JSON.stringify(body) : undefined,
      ...opts,
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  } catch (e) {
    throw e;
  }
}

// ── Toast ──────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Time helpers ───────────────────────────────────────────
function relTime(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return new Date(iso).toLocaleDateString();
}

// ── Emoji with fallback ────────────────────────────────────
function icon(emoji, fallback) {
  // We trust emoji support but provide fallback text
  return `<span role="img" aria-label="">${emoji}</span>`;
}

// ═══════════════════════════════════════════════════════════
// E2EE — Web Crypto ECDH + AES-GCM
// ═══════════════════════════════════════════════════════════
async function generateKeyPair() {
  const kp = await crypto.subtle.generateKey(
    { name: 'ECDH', namedCurve: 'P-256' }, true, ['deriveKey']
  );
  const pub = await crypto.subtle.exportKey('spki', kp.publicKey);
  const priv = await crypto.subtle.exportKey('pkcs8', kp.privateKey);
  return {
    publicKey: kp.publicKey,
    privateKey: kp.privateKey,
    publicKeyB64: btoa(String.fromCharCode(...new Uint8Array(pub))),
    privateKeyB64: btoa(String.fromCharCode(...new Uint8Array(priv))),
  };
}
async function importPublicKey(b64) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  return crypto.subtle.importKey('spki', raw, { name: 'ECDH', namedCurve: 'P-256' }, false, []);
}
async function importPrivateKey(b64) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  return crypto.subtle.importKey('pkcs8', raw, { name: 'ECDH', namedCurve: 'P-256' }, false, ['deriveKey']);
}
async function deriveAESKey(privateKey, publicKey) {
  return crypto.subtle.deriveKey(
    { name: 'ECDH', public: publicKey },
    privateKey,
    { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}
async function encryptMessage(plaintext, recipientPubKeyB64) {
  const ephemeral = await generateKeyPair();
  const recipientPub = await importPublicKey(recipientPubKeyB64);
  const sharedKey = await deriveAESKey(ephemeral.privateKey, recipientPub);
  const nonce = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv: nonce },
    sharedKey,
    new TextEncoder().encode(plaintext)
  );
  return {
    ciphertext: btoa(String.fromCharCode(...new Uint8Array(ct))),
    ephemeral_pubkey: ephemeral.publicKeyB64,
    nonce: btoa(String.fromCharCode(...nonce)),
  };
}
async function decryptMessage(ciphertext, ephemeralPubKeyB64, nonceB64, myPrivateKey) {
  try {
    const ephemeralPub = await importPublicKey(ephemeralPubKeyB64);
    const sharedKey = await deriveAESKey(myPrivateKey, ephemeralPub);
    const nonce = Uint8Array.from(atob(nonceB64), c => c.charCodeAt(0));
    const ct = Uint8Array.from(atob(ciphertext), c => c.charCodeAt(0));
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, sharedKey, ct);
    return new TextDecoder().decode(pt);
  } catch {
    return '[Cannot decrypt — message was encrypted for a different key]';
  }
}
async function loadOrCreateKeyPair() {
  const storedPriv = localStorage.getItem('e2ee_priv');
  if (storedPriv) {
    state.privateKey = await importPrivateKey(storedPriv);
    return;
  }
  const kp = await generateKeyPair();
  state.privateKey = kp.privateKey;
  state.publicKey = kp.publicKey;
  localStorage.setItem('e2ee_priv', kp.privateKeyB64);
  // Register public key with server
  if (state.token) {
    apiFetch('PUT', '/users/me/pubkey', { public_key: kp.publicKeyB64 }).catch(() => {});
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  if (!state.token) {
    renderAuth(app);
    return;
  }
  // Check setup
  const path = location.hash.replace('#', '') || '/';
  if (path.startsWith('/join/')) {
    state.pendingInvite = path.split('/join/')[1];
    renderAuth(app, 'register');
    return;
  }
  renderShell(app);
}

function renderShell(app) {
  const pages = [
    { id: 'feed', label: 'Feed', emoji: '🏠', fallback: '⌂' },
    { id: 'messages', label: 'Messages', emoji: '💬', fallback: '✉' },
    { id: 'invites', label: 'Invites', emoji: '🔗', fallback: '#' },
    { id: 'profile', label: 'Profile', emoji: '👤', fallback: '○' },
    ...(state.user?.is_admin ? [{ id: 'admin', label: 'Admin', emoji: '⚙️', fallback: '✦' }] : []),
  ];

  app.innerHTML = `
  <nav class="sidebar">
    <div class="sidebar-logo">Warta<br><span>just us</span></div>
    ${pages.map(p => `
      <div class="nav-item ${state.page === p.id ? 'active' : ''}" onclick="navigate('${p.id}')">
        <span class="icon">${p.emoji}</span>
        <span class="nav-label">${p.label}</span>
      </div>
    `).join('')}
    <div class="nav-spacer"></div>
    <div style="padding: 8px 12px; display:flex; align-items:center; gap:8px;">
      <div class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <div class="theme-toggle-knob"></div>
      </div>
      <span style="font-size:.78rem; color:var(--text-3);" class="nav-label">Theme</span>
    </div>
    <div class="nav-item" onclick="doLogout()" style="color:var(--red)">
      <span class="icon">🚪</span>
      <span class="nav-label">Logout</span>
    </div>
  </nav>
  <div class="main" id="main-content"></div>
  `;
  renderPage();
}

function renderPage() {
  const main = document.getElementById('main-content');
  if (!main) return;
  switch (state.page) {
    case 'feed': renderFeed(main); break;
    case 'messages': renderMessages(main); break;
    case 'invites': renderInvites(main); break;
    case 'profile': renderProfile(main); break;
    case 'admin': renderAdmin(main); break;
    default: renderFeed(main);
  }
}

function navigate(page) {
  state.page = page;
  renderPage();
  // Update active nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.textContent.trim().toLowerCase().includes(page.toLowerCase()));
  });
}

// ── Auth screens ───────────────────────────────────────────
function renderAuth(app, mode) {
  const isRegister = mode === 'register' || location.hash.includes('register');
  app.innerHTML = `
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">Warta</div>
      <div class="auth-sub">${isRegister ? 'Create your account' : 'Welcome back'}</div>
      ${isRegister ? renderRegisterForm() : renderLoginForm()}
    </div>
  </div>`;
}
function renderLoginForm() {
  return `
  <div class="field"><label>Username or email</label>
    <input type="text" id="login-input" placeholder="username or email" autocomplete="username"></div>
  <div class="field"><label>Password</label>
    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
  <button class="btn btn-primary" style="width:100%" onclick="doLogin()">
    Sign in 🔑
  </button>
  <p style="text-align:center; margin-top:14px; font-size:.85rem; color:var(--text-3)">
    Have an invite? <a href="#register" onclick="render()" style="color:var(--accent)">Register</a>
  </p>`;
}
function renderRegisterForm() {
  return `
  <div class="field"><label>Invite code</label>
    <input type="text" id="reg-invite" placeholder="paste invite code" value="${state.pendingInvite || ''}"></div>
  <div class="field"><label>Username</label>
    <input type="text" id="reg-username" placeholder="yourname" autocomplete="username"></div>
  <div class="field"><label>Display name</label>
    <input type="text" id="reg-display" placeholder="Your Name"></div>
  <div class="field"><label>Email</label>
    <input type="email" id="reg-email" placeholder="you@email.com" autocomplete="email"></div>
  <div class="field"><label>Password</label>
    <input type="password" id="reg-pass" placeholder="at least 8 characters" autocomplete="new-password">
    <div class="field-hint">Minimum 8 characters</div></div>
  <button class="btn btn-primary" style="width:100%" onclick="doRegister()">
    Create account ✨
  </button>
  <p style="text-align:center; margin-top:14px; font-size:.85rem; color:var(--text-3)">
    Already have an account? <a href="#" onclick="location.hash=''; render()" style="color:var(--accent)">Sign in</a>
  </p>`;
}

// ── Feed ───────────────────────────────────────────────────
function renderFeed(main) {
  main.innerHTML = `
  <div class="topbar">
    <span class="topbar-title">Feed</span>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-sm" onclick="loadFeed()">↻ Refresh</button>
    </div>
  </div>
  <div class="feed">
    <div class="card composer">
      <textarea id="post-content" placeholder="What's on your mind?" maxlength="280" oninput="updateCharCount(this)"></textarea>
      <div class="composer-footer">
        <span class="char-count" id="char-count">280</span>
        <div class="composer-actions">
          <label class="btn btn-ghost btn-sm" title="Attach media">
            📎 Media
            <input type="file" id="media-file" style="display:none" accept="image/*,audio/*,video/*" onchange="handleMediaSelect(this)">
          </label>
          <button class="btn btn-ghost btn-sm" onclick="openLongformModal()" title="Write a long-form post with Markdown support">📝 Long post</button>
          <button class="btn btn-primary btn-sm" onclick="submitPost()">Post</button>
        </div>
      </div>
      <div id="media-preview" style="margin-top:8px"></div>
    </div>
    <div id="feed-posts"><div style="color:var(--text-3); text-align:center; padding:32px">Loading feed... ⏳</div></div>
  </div>`;
  loadFeed();
}

async function loadFeed() {
  try {
    const data = await apiFetch('GET', '/posts');
    const posts = data.posts || [];
    state.posts = posts;
    const container = document.getElementById('feed-posts');
    if (!container) return;
    if (!posts.length) {
      container.innerHTML = `<div style="color:var(--text-3); text-align:center; padding:32px">No posts yet. Be the first! 🌱</div>`;
      return;
    }
    container.innerHTML = posts.map(renderPost).join('');
  } catch (e) {
    toast('Could not load feed: ' + e.message, 'error');
  }
}

function renderPost(post) {
  const hasLongform = post.post_type === 'longform' || post.has_longform;
  const mediaTags = (post.media || []).map(m => {
    if (m.media_type === 'image') return `<img src="${esc(m.url)}" alt="" onclick="openMedia('${esc(m.url)}', 'image')" style="cursor:pointer">`;
    if (m.media_type === 'audio') return `<audio controls src="${esc(m.url)}"></audio>`;
    if (m.media_type === 'video') return `<video controls src="${esc(m.url)}" style="max-height:300px"></video>`;
    return '';
  }).join('');

  return `
  <div class="card" id="post-${post.id}">
    <div class="post-header">
      <div class="avatar">${post.avatar_path ? `<img src="${esc(post.avatar_path)}" alt="">` : '👤'}</div>
      <div class="post-meta">
        <div class="post-author">${esc(post.display_name || post.username)}</div>
        <div class="post-username">@${esc(post.username)} · <span class="post-time">${relTime(post.created_at)}</span>${
          post.post_type === 'longform' ? ' · <span class="post-type-badge">long read</span>' : ''
        }</div>
      </div>
    </div>
    ${post.title ? `<div class="post-title">${esc(post.title)}</div>` : ''}
    <div class="post-content ${post.post_type === 'longform' ? 'longform md-rendered' : ''}">${
      post.post_type === 'longform' ? renderMarkdown(post.content) : esc(post.content)
    }</div>
    ${mediaTags ? `<div class="post-media"><div class="media-grid ${(post.media||[]).length === 1 ? 'single' : ''}">${mediaTags}</div></div>` : ''}
    <div class="post-actions">
      <button class="action-btn ${post.user_reacted ? 'reacted' : ''}" onclick="toggleReact('${post.id}', this)">
        <span class="icon">👍</span> <span class="react-count">${post.reaction_count || 0}</span>
      </button>
      <button class="action-btn" onclick="toggleComments('${post.id}')">
        <span class="icon">💬</span> ${post.comment_count || 0}
      </button>
      <button class="action-btn" onclick="openModVoteModal('${post.id}', 'post')">
        <span class="icon">🚩</span>
      </button>
      ${state.user?.is_admin ? `
        <button class="action-btn" style="color:var(--red)" onclick="adminRemove('post', '${post.id}')">
          <span class="icon">🗑️</span>
        </button>` : ''}
      ${post.author_id === state.user?.id ? `
        <button class="action-btn" style="color:var(--red)" onclick="deletePost('${post.id}')">
          <span class="icon">✕</span>
        </button>` : ''}
      ${hasLongform ? `<button class="expand-btn" onclick="toggleLongform('${post.id}')">Read more ↓</button>` : ''}
    </div>
    <div class="comments-section" id="comments-${post.id}">
      <div class="comment-input-row">
        <input type="text" placeholder="Write a comment…" id="comment-input-${post.id}"
          onkeydown="if(event.key==='Enter') addComment('${post.id}')">
        <button class="btn btn-primary btn-sm" onclick="addComment('${post.id}')">Send</button>
      </div>
      <div id="comment-list-${post.id}"></div>
    </div>
    <div class="longform-panel" id="longform-${post.id}"></div>
  </div>`;
}

function toggleComments(postID) {
  const section = document.getElementById('comments-' + postID);
  const isOpen = section.classList.toggle('open');
  if (isOpen && !section.dataset.loaded) {
    loadComments(postID);
    section.dataset.loaded = '1';
  }
}

async function loadComments(postID) {
  try {
    const comments = await apiFetch('GET', '/posts/' + postID + '/comments');
    const list = document.getElementById('comment-list-' + postID);
    if (!list) return;
    if (!comments.length) {
      list.innerHTML = `<div style="font-size:.82rem; color:var(--text-3); padding:4px 0">No comments yet.</div>`;
      return;
    }
    list.innerHTML = comments.map(c => `
      <div class="comment">
        <div class="avatar" style="width:28px;height:28px;font-size:.7rem">👤</div>
        <div class="comment-body">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="comment-author">${esc(c.display_name || c.username)}</span>
            <span class="comment-time">${relTime(c.created_at)}</span>
          </div>
          <div class="comment-text md-rendered">${renderInlineMarkdown(c.content)}</div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    toast('Could not load comments', 'error');
  }
}

async function addComment(postID) {
  const input = document.getElementById('comment-input-' + postID);
  const content = input?.value?.trim();
  if (!content) return;
  try {
    await apiFetch('POST', '/posts/' + postID + '/comments', { content });
    input.value = '';
    loadComments(postID);
    // Update comment count
    const postEl = document.getElementById('post-' + postID);
    if (postEl) {
      const countEl = postEl.querySelector('.action-btn:nth-child(2)');
      // simple reload approach
    }
  } catch (e) {
    toast(e.message, 'error');
  }
}

function toggleLongform(postID) {
  const panel = document.getElementById('longform-' + postID);
  const card = document.getElementById('post-' + postID);
  const btn = card.querySelector('.expand-btn');
  if (panel.classList.toggle('open')) {
    btn.textContent = 'Show less ↑';
    loadLongform(postID, panel);
  } else {
    btn.textContent = 'Read more ↓';
  }
}

async function loadLongform(postID, panel) {
  if (panel.dataset.loaded) return;
  panel.dataset.loaded = '1';
  try {
    // Find longform child post
    const data = await apiFetch('GET', '/posts?parent=' + postID + '&type=longform');
    const lf = (data.posts || [])[0];
    if (lf) {
      panel.innerHTML = `
        ${lf.title ? `<div class="post-title">${esc(lf.title)}</div>` : ''}
        <div class="post-content longform md-rendered">${renderMarkdown(lf.content)}</div>`;
    } else {
      panel.innerHTML = `<div style="color:var(--text-3); font-size:.875rem">No expanded post yet.</div>`;
    }
  } catch { panel.innerHTML = '...'; }
}

async function toggleReact(postID, btn) {
  try {
    const res = await apiFetch('POST', '/posts/' + postID + '/react');
    btn.classList.toggle('reacted', res.reacted);
    const count = btn.querySelector('.react-count');
    if (count) count.textContent = parseInt(count.textContent) + (res.reacted ? 1 : -1);
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function deletePost(postID) {
  if (!confirm('Delete this post?')) return;
  try {
    await apiFetch('DELETE', '/posts/' + postID);
    document.getElementById('post-' + postID)?.remove();
    toast('Post deleted', 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function submitPost() {
  const content = document.getElementById('post-content')?.value?.trim();
  if (!content) return;
  try {
    const post = { post_type: 'micro', content };
    // Media attachment
    if (state.pendingMediaID) {
      post.media_id = state.pendingMediaID;
    }
    await apiFetch('POST', '/posts', post);
    document.getElementById('post-content').value = '';
    document.getElementById('char-count').textContent = '280';
    document.getElementById('media-preview').innerHTML = '';
    state.pendingMediaID = null;
    toast('Posted! 🎉', 'success');
    await loadFeed();
  } catch (e) {
    toast(e.message, 'error');
  }
}

function updateCharCount(el) {
  const remaining = 280 - el.value.length;
  const counter = document.getElementById('char-count');
  if (counter) {
    counter.textContent = remaining;
    counter.classList.toggle('warn', remaining < 20);
  }
}

async function handleMediaSelect(input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById('media-preview');

  // Compression reminder
  const type = file.type.split('/')[0];
  const hints = {
    image: '📸 Tip: Compress images first using Squoosh (squoosh.app) or TinyPNG to save your storage.',
    video: '🎬 Tip: Compress video first using HandBrake before uploading. Your 1 GB quota will thank you.',
    audio: '🎵 Tip: Compress audio first. MP3 at 128kbps is usually good quality and small.',
  };
  if (hints[type]) {
    preview.innerHTML = `<div style="font-size:.78rem;color:var(--text-3);padding:6px 0">${hints[type]}</div>`;
  }

  const formData = new FormData();
  formData.append('file', file);

  try {
    preview.innerHTML += `<div style="font-size:.8rem;color:var(--text-3)">Uploading… ⏳</div>`;
    const headers = {};
    if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
    const res = await fetch(API + '/media/upload', { method: 'POST', headers, body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    state.pendingMediaID = data.id;
    const usedPct = data.quota?.used_pct || '0%';
    preview.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;font-size:.8rem;margin-top:4px">
        <span style="color:var(--green)">✓ Ready to attach</span>
        <span style="color:var(--text-3)">Storage: ${usedPct}</span>
        <button class="btn btn-ghost btn-sm" onclick="state.pendingMediaID=null; this.parentNode.parentNode.innerHTML=''">✕</button>
      </div>`;
    if (data.compression_hint) {
      preview.innerHTML += `<div style="font-size:.75rem;color:var(--text-3);margin-top:2px">${data.compression_hint}</div>`;
    }
    toast('Media uploaded ✓', 'success');
  } catch (e) {
    preview.innerHTML = `<div style="color:var(--red);font-size:.8rem">${e.message}</div>`;
  }
}

function switchLfTab(tab, btn) {
  document.querySelectorAll('.lf-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const writePanel = document.getElementById('lf-write-panel');
  const previewPanel = document.getElementById('lf-preview-panel');
  if (tab === 'preview') {
    writePanel.style.display = 'none';
    previewPanel.style.display = 'block';
    const content = document.getElementById('lf-content')?.value || '';
    const previewEl = document.getElementById('lf-preview-content');
    if (content.trim()) {
      previewEl.innerHTML = renderMarkdown(content);
    } else {
      previewEl.innerHTML = '<div class="lf-preview-empty">Start writing to see a preview</div>';
    }
  } else {
    writePanel.style.display = 'block';
    previewPanel.style.display = 'none';
  }
}

function mdInsert(before, after) {
  const ta = document.getElementById('lf-content');
  if (!ta) return;
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const selected = ta.value.substring(start, end);
  const b = before.replace(/\\n/g, '\n');
  const a = after.replace(/\\n/g, '\n');
  ta.value = ta.value.substring(0, start) + b + selected + a + ta.value.substring(end);
  ta.focus();
  ta.selectionStart = start + b.length;
  ta.selectionEnd = start + b.length + selected.length;
}

function mdInsertLink() {
  const url = prompt('Enter URL:', 'https://');
  if (!url) return;
  const ta = document.getElementById('lf-content');
  if (!ta) return;
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const selected = ta.value.substring(start, end) || 'link text';
  const insert = `[${selected}](${url})`;
  ta.value = ta.value.substring(0, start) + insert + ta.value.substring(end);
  ta.focus();
}

async function loadConversations() {

async function openConversation(userID, displayName) {
  state.activeConvo = userID;
  const chatArea = document.getElementById('chat-area');
  if (!chatArea) return;
  chatArea.innerHTML = `
    <div class="e2ee-notice">🔒 End-to-end encrypted · Safety first: if you lose your account, message history cannot be recovered</div>
    <div class="chat-messages" id="chat-messages">
      <div style="text-align:center;color:var(--text-3);font-size:.82rem">Decrypting messages…</div>
    </div>
    <div class="chat-input-row">
      <input type="text" placeholder="Type a message… (encrypted)" id="chat-input"
        onkeydown="if(event.key==='Enter') sendMessage('${userID}')">
      <button class="btn btn-primary" onclick="sendMessage('${userID}')">Send 🔒</button>
    </div>`;

  await ensurePrivateKey();

  try {
    const data = await apiFetch('GET', '/messages/' + userID);
    const msgs = data.messages || [];
    const container = document.getElementById('chat-messages');
    if (!container) return;
    if (!msgs.length) {
      container.innerHTML = `<div style="text-align:center;color:var(--text-3);font-size:.82rem">No messages yet. Say hello! 👋</div>`;
      return;
    }
    const rendered = await Promise.all(msgs.map(async m => {
      const isMine = m.sender_id === state.user.id;
      let text = '…';
      if (state.privateKey) {
        text = await decryptMessage(m.ciphertext, m.ephemeral_pubkey, m.nonce, state.privateKey);
      }
      return `<div class="message-bubble ${isMine ? 'mine' : 'theirs'}">
        ${esc(text)}
        <div style="font-size:.7rem;opacity:.6;margin-top:3px;text-align:${isMine?'right':'left'}">${relTime(m.created_at)}</div>
      </div>`;
    }));
    container.innerHTML = rendered.join('');
    container.scrollTop = container.scrollHeight;
  } catch (e) {
    toast('Could not load messages: ' + e.message, 'error');
  }
}

async function sendMessage(recipientID) {
  const input = document.getElementById('chat-input');
  const text = input?.value?.trim();
  if (!text) return;

  await ensurePrivateKey();

  try {
    // Get recipient's public key
    const keyData = await apiFetch('GET', '/users/' + recipientID + '/pubkey');
    if (!keyData.public_key) {
      toast('Recipient has not set up E2EE yet. Ask them to log in again.', 'error');
      return;
    }
    const encrypted = await encryptMessage(text, keyData.public_key);
    await apiFetch('POST', '/messages/' + recipientID, encrypted);
    input.value = '';
    // Append optimistically
    const container = document.getElementById('chat-messages');
    if (container) {
      container.innerHTML += `<div class="message-bubble mine">
        ${esc(text)}
        <div style="font-size:.7rem;opacity:.6;margin-top:3px;text-align:right">just now</div>
      </div>`;
      container.scrollTop = container.scrollHeight;
    }
  } catch (e) {
    toast('Send failed: ' + e.message, 'error');
  }
}

async function ensurePrivateKey() {
  if (!state.privateKey) await loadOrCreateKeyPair();
}

function ensureWebSocket() {
  if (state.ws) return;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws?token=${state.token}`);
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'new_message') {
      toast('New message 💬', 'info');
      if (state.page === 'messages') loadConversations();
    }
  };
  ws.onclose = () => { state.ws = null; };
  state.ws = ws;
}

function formatBytes(b) {
  if (!b) return '0 B';
  const k = 1024;
  const sizes = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(b)/Math.log(k));
  return (b/Math.pow(k,i)).toFixed(1) + ' ' + sizes[i];
}

    await apiFetch('POST', '/mod/admin/user/disable', { user_id: userID, disable: isActive });
    toast(isActive ? 'User disabled' : 'User enabled', 'success');
    loadAdminUsers();
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function loadModQueue() {
  try {
    const queue = await apiFetch('GET', '/mod/queue');
    const el = document.getElementById('mod-queue');
    if (!el) return;
    if (!queue.length) {
      el.innerHTML = `<div style="color:var(--text-3);font-size:.875rem">No reports pending. ✓</div>`;
      return;
    }
    el.innerHTML = queue.map(q => `
      <div style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:6px">
        <div style="font-size:.82rem;color:var(--text-2)">${q.target_type} · ${q.target_id}</div>
        <div class="vote-bar">
          <span class="vote-remove">🚩 ${q.remove_votes} remove</span>
          <span style="margin:0 4px">·</span>
          <span class="vote-keep">✓ ${q.keep_votes} keep</span>
          <span style="margin:0 4px">·</span>
          <span>${relTime(q.last_vote)}</span>
        </div>
        <div style="margin-top:8px;display:flex;gap:6px">
          <button class="btn btn-danger btn-sm" onclick="adminRemove('${q.target_type}', '${q.target_id}')">Remove now 🗑️</button>
          <button class="btn btn-ghost btn-sm" onclick="adminRestore('${q.target_type}', '${q.target_id}')">Restore ✓</button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    toast('Could not load mod queue', 'error');
  }
}

async function adminRemove(type, id) {
  const reason = prompt('Reason for removal (optional):', 'Removed by admin');
  try {
    await apiFetch('POST', '/mod/admin/remove', { target_type: type, target_id: id, reason: reason || 'Admin removal' });
    toast('Removed ✓', 'success');
    if (type === 'post') document.getElementById('post-' + id)?.remove();
    loadModQueue();
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function adminRestore(type, id) {
  try {
    await apiFetch('POST', '/mod/admin/restore', { target_type: type, target_id: id });
    toast('Restored ✓', 'success');
    loadModQueue();
    loadFeed();
  } catch (e) {
    toast(e.message, 'error');
  }
}

function openModVoteModal(targetID, targetType) {
  showModal(`
    <div class="modal-title">🚩 Report content</div>
    <p style="font-size:.875rem;color:var(--text-2);margin-bottom:14px">
      Community moderation: 2/3 majority of votes removes this content. Admins can also remove it directly.
    </p>
    <div class="field"><label>Reason (optional)</label><input type="text" id="mod-reason" placeholder="e.g. spam, inappropriate"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-ghost" onclick="castVote('${targetID}','${targetType}','keep')">✓ Keep</button>
      <button class="btn btn-danger" onclick="castVote('${targetID}','${targetType}','remove')">🚩 Remove</button>
    </div>
  `);
}

async function castVote(id, type, vote) {
  const reason = document.getElementById('mod-reason')?.value || '';
  try {
    const res = await apiFetch('POST', '/mod/vote', { target_type: type, target_id: id, vote, reason });
    closeModal();
    if (res.auto_removed) {
      toast('Content removed by community vote ✓', 'success');
      if (type === 'post') document.getElementById('post-' + id)?.remove();
    } else {
      toast(`Vote recorded. ${res.remove_votes} remove, ${res.keep_votes} keep.`, 'success');
    }
  } catch (e) {
    toast(e.message, 'error');
  }
}

// ── Auth actions ───────────────────────────────────────────
async function doLogin() {
  const login = document.getElementById('login-input')?.value?.trim();
  const pass = document.getElementById('login-pass')?.value;
  if (!login || !pass) return toast('Fill in all fields', 'error');
  try {
    const data = await apiFetch('POST', '/auth/login', { login, password: pass });
    // Fetch full user profile
    const headers = { 'Authorization': 'Bearer ' + data.token, 'Content-Type': 'application/json' };
    const profileRes = await fetch(API + '/users/me', { headers });
    const profile = await profileRes.json();
    saveAuth(data.token, profile, true);
    applyTheme(profile.theme_pref || 'auto');
    await loadOrCreateKeyPair();
    state.page = 'feed';
    render();
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function doRegister() {
  const invite = document.getElementById('reg-invite')?.value?.trim();
  const username = document.getElementById('reg-username')?.value?.trim();
  const display = document.getElementById('reg-display')?.value?.trim();
  const email = document.getElementById('reg-email')?.value?.trim();
  const pass = document.getElementById('reg-pass')?.value;
  if (!invite || !username || !email || !pass) return toast('Fill in all fields', 'error');

  // Generate E2EE keypair before registering
  const kp = await generateKeyPair();
  localStorage.setItem('e2ee_priv', kp.privateKeyB64);
  state.privateKey = kp.privateKey;

  try {
    const data = await apiFetch('POST', '/auth/register', {
      invite_code: invite, username, display_name: display || username,
      email, password: pass, public_key: kp.publicKeyB64,
    });
    const profileRes = await fetch(API + '/users/me', {
      headers: { 'Authorization': 'Bearer ' + data.token, 'Content-Type': 'application/json' }
    });
    const profile = await profileRes.json();
    saveAuth(data.token, profile, true);
    state.pendingInvite = null;
    state.page = 'feed';
    render();
    toast('Welcome to Warta! 🎉', 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function doLogout() {
  try { await apiFetch('POST', '/auth/logout'); } catch {}
  clearAuth();
  state.ws?.close();
  state.ws = null;
  state.page = 'feed';
  render();
}

// ── Users cache ────────────────────────────────────────────
async function loadUsers() {
  if (state.users.length) return state.users;
  state.users = await apiFetch('GET', '/users');
  return state.users;
}

// ── Modal ──────────────────────────────────────────────────
function showModal(html) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
}
function closeModal() {
  document.getElementById('modal-overlay')?.remove();
}

// ── Media viewer ───────────────────────────────────────────
function openMedia(url, type) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.style.cursor = 'zoom-out';
  const img = document.createElement('img');
  img.src = url;
  img.style.cssText = 'max-width:90vw;max-height:90vh;border-radius:var(--radius);object-fit:contain';
  overlay.appendChild(img);
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
}

// ── Escape ─────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Markdown parser (XSS-safe: escapes first, then transforms) ──
function renderMarkdown(raw) {
  if (!raw) return '';
  // Escape HTML first for safety
  let text = esc(raw);

  // Code blocks (``` ... ```)
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code class="${lang}">${code.trim()}</code></pre>`;
  });

  // Inline code (` ... `)
  text = text.replace(/`([^`\n]+?)`/g, '<code>$1</code>');

  // Headings (must be at start of line)
  text = text.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Horizontal rule
  text = text.replace(/^(?:---|\*\*\*|___)\s*$/gm, '<hr>');

  // Blockquotes
  text = text.replace(/^&gt; (.+)$/gm, '<blockquote><p>$1</p></blockquote>');
  // Merge consecutive blockquotes
  text = text.replace(/<\/blockquote>\n<blockquote>/g, '\n');

  // Bold + italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/_(.+?)_/g, '<em>$1</em>');
  // Strikethrough
  text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');

  // Links [text](url)
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
    // Only allow http/https links for security
    if (/^https?:\/\//i.test(url)) {
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`;
    }
    return `[${label}](${url})`;
  });

  // Auto-link bare URLs
  text = text.replace(/(?<!\")(?<!=)(https?:\/\/[^\s<&]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');

  // Task lists
  text = text.replace(/^- \[x\] (.+)$/gm, '<li class="task-item"><input type="checkbox" checked disabled> $1</li>');
  text = text.replace(/^- \[ \] (.+)$/gm, '<li class="task-item"><input type="checkbox" disabled> $1</li>');

  // Unordered lists
  text = text.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/((?:<li(?:\s[^>]*)?>[\s\S]*?<\/li>\n?)+)/g, (match) => {
    if (match.includes('task-item')) return `<ul style="list-style:none;padding-left:0">${match}</ul>`;
    return `<ul>${match}</ul>`;
  });

  // Ordered lists
  text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  // Paragraphs: convert double newlines
  text = text.replace(/\n{2,}/g, '</p><p>');
  // Single newlines to <br> (but not inside pre/code blocks or after block elements)
  text = text.replace(/(?<!<\/h[1-4]>|<\/blockquote>|<\/pre>|<\/ul>|<\/ol>|<hr>|<\/p>|<p>)\n(?!<h[1-4]|<blockquote|<pre|<ul|<ol|<hr|<\/|<li)/g, '<br>');

  // Wrap in paragraph if not starting with a block element
  if (!/^<(h[1-4]|pre|blockquote|ul|ol|hr)/.test(text)) {
    text = '<p>' + text + '</p>';
  }

  // Clean up empty paragraphs
  text = text.replace(/<p>\s*<\/p>/g, '');

  return text;
}

// Render inline markdown only (for comments — no blocks)
function renderInlineMarkdown(raw) {
  if (!raw) return '';
  let text = esc(raw);
  text = text.replace(/`([^`\n]+?)`/g, '<code>$1</code>');
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
    if (/^https?:\/\//i.test(url)) {
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`;
    }
    return `[${label}](${url})`;
  });
  text = text.replace(/(?<!\")(?<!=)(https?:\/\/[^\s<&]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
  return text;
}

// ── Hash routing ───────────────────────────────────────────
window.addEventListener('hashchange', () => {
  const hash = location.hash.replace('#', '');
  if (hash.startsWith('/join/')) {
    state.pendingInvite = hash.split('/join/')[1];
    renderAuth(document.getElementById('app'), 'register');
  }
});

// ── Init ───────────────────────────────────────────────────
async function init() {
  if (loadAuth()) {
    await loadOrCreateKeyPair();
    render();
  } else {
    render();
  }
}
init();
</script>
