server {
    listen 80;
    server_name _;

    client_max_body_size 500M;

    # API routes → Go backend
    location /api/ {
        proxy_pass http://warta_backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket for real-time (messaging, feed updates)
    location /ws {
        proxy_pass http://warta_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Uploaded media — served directly by nginx for speed
    location /uploads/ {
        alias /app/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # No directory listing
        autoindex off;
    }

    # Frontend SPA
    location / {
        proxy_pass http://warta_frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SPA fallback — all routes go to index
        proxy_intercept_errors on;
        error_page 404 = @frontend_fallback;
    }

    location @frontend_fallback {
        proxy_pass http://warta_frontend:3000;
    }
}
