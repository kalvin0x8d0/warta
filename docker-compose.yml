services:
  postgres:
    image: postgres:16-alpine
    container_name: warta_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-warta}
      POSTGRES_USER: ${POSTGRES_USER:-warta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warta}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - warta_internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: warta_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-warta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-warta}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      STORAGE_PATH: /app/uploads
      MAX_USER_STORAGE_MB: 1024
      AUDIO_MAX_SECONDS: 420
      VIDEO_MAX_SECONDS: 300
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - warta_internal
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: warta_frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - uploads_data:/app/uploads:ro
    networks:
      - warta_internal
    ports:
      - "${APP_PORT:-50982}:3000"

volumes:
  postgres_data:
  uploads_data:

networks:
  warta_internal:
    internal: true
